---
image: alpine/edge
packages:
  - git
sources:
  - https://git.sr.ht:~the-commits/niri
secrets:
  - 897269c2-f89e-4f84-92a9-ae772f42f161
environment:
  repo_name: niri
  github_username: the-commits
  github_repo: the-commits/niri
tasks:
  - push: |
      set +x
      cd "${repo_name}"

      # Inject mirror notice for GitHub (not present on sourcehut)
      cat > /tmp/notice.md <<'NOTICE'

      > **Do not open issues or pull requests on GitHub** — the mirror there is
      > [read-only](https://git.sr.ht/~the-commits/niri).
      > Please use the [sourcehut issue tracker](https://todo.sr.ht/~the-commits/niri)
      > and send patches to [~the-commits/niri@lists.sr.ht](mailto:~the-commits/niri@lists.sr.ht).

      NOTICE
      sed -i '3r /tmp/notice.md' README.md
      git add README.md
      git commit -m "chore: add mirror notice (GitHub-only)"

      github_token=$(cat ~/secrets/github_config_mirror_pat)
      github_url=$(printf \
        "https://%s:%s@github.com/%s" \
        "${github_username}" \
        "${github_token}" \
        "${github_repo}")
      git push --all "${github_url}" -f
