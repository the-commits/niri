---
image: alpine/edge
packages:
  - git
secrets:
  - 543a9691-ef39-4791-a17c-47bcc0bc6299
  - 897269c2-f89e-4f84-92a9-ae772f42f161
environment:
  repo_name: niri
  github_username: the-commits
  github_repo: the-commits/niri
tasks:
  - clone: |
      set +x
      export GIT_SSH_COMMAND="ssh -i ~/.ssh/builds_srht -o StrictHostKeyChecking=accept-new"
      git clone git@git.sr.ht:~the-commits/niri "${repo_name}"
  - push: |
      set +x
      cd "${repo_name}"
      export GIT_SSH_COMMAND="ssh -i ~/.ssh/builds_srht -o StrictHostKeyChecking=accept-new"
      github_token=$(cat ~/secrets/github_config_mirror_pat)
      github_url=$(printf \
        "https://%s:%s@github.com/%s" \
        "${github_username}" \
        "${github_token}" \
        "${github_repo}")
      git push --all "${github_url}" -f
